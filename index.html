<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Studio Canvas - Dynamic Themes</title>
    <style>
        :root {
            /* Tema Default (Dark) */
            --bg-color: #121214;
            --panel-bg: rgba(30, 30, 35, 0.75);
            --accent-color: #6366f1;
            --text-color: #e4e4e7;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* Class khusus saat mode Light aktif */
        body.light-theme {
            --bg-color: #f4f4f5;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --text-color: #18181b;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background-color 0.3s ease; /* Transisi smooth saat ganti tema */
        }

        /* Canvas Wrapper */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Control Panel */
        .panel {
            position: absolute;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #toolbar {
            top: 20px;
            left: 20px;
            width: 300px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        #top-bar {
            top: 20px;
            right: 20px;
            flex-direction: row;
            align-items: center;
        }

        h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a1a1aa;
            margin-bottom: 8px;
        }

        body.light-theme h3 {
            color: #71717a;
        }

        .section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }

        .section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        body.light-theme button {
            background: rgba(0, 0, 0, 0.03);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        body.light-theme button:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
        }

        button.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
            color: white;
        }

        body.light-theme button.active {
            color: white;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a1a1aa;
        }

        body.light-theme .control-label {
            color: #71717a;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        body.light-theme input[type="range"] {
            background: rgba(0, 0, 0, 0.1);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
        }

        .color-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .color-main-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .spectrum-picker-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .preset-colors {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            flex-grow: 1;
        }

        .color-dot {
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.3);
            transition: transform 0.1s, border-color 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.1);
        }
        
        .color-dot.selected {
            border: 2px solid #ffffff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        body.light-theme .color-dot.selected {
            border: 2px solid #18181b;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
        }

        .color-inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 8px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-box label {
            font-size: 0.75rem;
            color: #a1a1aa;
        }

        body.light-theme .input-box label {
            color: #71717a;
        }

        .input-box input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--text-color);
            font-family: monospace;
            font-size: 0.8rem;
            outline: none;
            text-transform: uppercase;
        }

        body.light-theme .input-box input {
            background: rgba(255, 255, 255, 0.8);
        }

        .action-row {
            display: flex;
            gap: 8px;
        }

        .action-row button {
            flex: 1;
            padding: 8px;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        body.light-theme .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        #mode-indicator {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        #toolbar::-webkit-scrollbar {
            width: 4px;
        }
        #toolbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <!-- Top Action Bar -->
    <div id="top-bar" class="panel">
        <span id="mode-indicator">Status: Drawing Mode</span>
        <button id="btn-undo" title="Undo (Ctrl+Z)">↶</button>
        <button id="btn-redo" title="Redo (Ctrl+Y)">↷</button>
        <button id="btn-clear" class="btn-danger">Clear</button>
        <button id="btn-save" style="background: #10b981; color: white;">Save Canvas</button>
    </div>

    <!-- Main Sidebar Controls -->
    <div id="toolbar" class="panel">
        <!-- Kuas Styles -->
        <div class="section">
            <h3>Brush Style</h3>
            <div class="style-grid">
                <button class="style-btn active" data-style="neon">✨ Neon Glow</button>
                <button class="style-btn" data-style="pen">✒️ Pen (Solid)</button>
                <button class="style-btn" data-style="calligraphy">🖋️ Calligraphy</button>
                <button class="style-btn" data-style="pencil">✏️ Pencil</button>
                <button class="style-btn" data-style="textured">🎨 Textured</button>
                <button class="style-btn" data-style="highlighter">🖍️ Highlighter</button>
                <button class="style-btn" data-style="sketch">🕸️ Sketch Line</button>
            </div>
        </div>

        <!-- Advanced Color System -->
        <div class="section">
            <h3>Color Engine</h3>
            <div class="color-block">
                <div class="color-main-row">
                    <div class="spectrum-picker-wrapper" title="Buka Spectrum Luas / EyeDropper">
                        <input type="color" id="color-picker" value="#00ffff">
                    </div>
                    <div class="preset-colors">
                        <div class="color-dot selected" style="background: #00ffff;" data-color="#00ffff"></div>
                        <div class="color-dot" style="background: #ff007f;" data-color="#ff007f"></div>
                        <div class="color-dot" style="background: #39ff14;" data-color="#39ff14"></div>
                        <div class="color-dot" style="background: #ffff00;" data-color="#ffff00"></div>
                        <div class="color-dot" style="background: #ffffff;" data-color="#ffffff"></div>
                    </div>
                </div>
                
                <div class="color-inputs-grid">
                    <div class="input-box">
                        <label for="hex-input">HEX Code</label>
                        <input type="text" id="hex-input" value="#00FFFF" maxlength="7">
                    </div><br>
                    <div class="input-box">
                        <label for="rgb-input">RGB Code</label>
                        <input type="text" id="rgb-input" value="rgb(0, 255, 255)">
                    </div>
                </div>
            </div>
        </div>

        <!-- Ukuran & Opacity -->
        <div class="section">
            <div class="control-group">
                <div class="control-label">
                    <span>Brush Size</span>
                    <span id="size-val">12px</span>
                </div>
                <input type="range" id="brush-size" min="1" max="100" value="12">
            </div>
            <div class="control-group" style="margin-top: 12px;">
                <div class="control-label">
                    <span>Opacity</span>
                    <span id="opacity-val">100%</span>
                </div>
                <input type="range" id="brush-opacity" min="10" max="100" value="100">
            </div>
        </div>

        <!-- Mode Penghapus & Background -->
        <div class="section">
            <h3>Tools & Canvas</h3>
            <div class="action-row" style="margin-bottom: 8px;">
                <button id="btn-draw" class="active">✏️ Draw Mode</button>
                <button id="btn-erase">🧽 Eraser</button>
            </div>
            <div class="control-group">
                <div class="control-label">
                    <span>Canvas Background</span>
                </div>
                <div class="action-row">
                    <button class="bg-btn active" data-bg="dark">Dark</button>
                    <button class="bg-btn" data-bg="light" style="color:#121214; background:#fff">Light</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Canvas Workspace -->
    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        // State Management
        let isDrawing = false;
        let points = []; 
        let currentStyle = 'neon';
        let currentColor = '#00ffff';
        let currentSize = 12;
        let currentOpacity = 1;
        let isEraser = false;
        let currentTheme = 'dark'; // Variabel internal tema melacak 'dark' atau 'light'
        
        let historyStack = [];
        let redoStack = [];
        const MAX_HISTORY = 25;

        // Inisialisasi awal ukuran canvas tanpa isi fillStyle latar belakang
        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // Context dibiarkan transparan murni, background diatur lewat CSS DOM body
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);
        }

        window.addEventListener('resize', resizeCanvas);
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        // --- TRACKING MOUSE & TOUCH (VEKTOREED MIDPOINT SMOOTHING) ---
        function getCoordinates(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoordinates(e);
            
            points = []; 
            points.push({ x: coords.x, y: coords.y });
            
            saveState();
            
            if (!isEraser && (currentStyle === 'textured' || currentStyle === 'highlighter')) {
                draw(e);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const coords = getCoordinates(e);
            points.push({ x: coords.x, y: coords.y });

            if (points.length < 2) return;

            ctx.save();
            
            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = currentSize * 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                const p1 = points[points.length - 2];
                const p2 = points[points.length - 1];
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            } else {
                ctx.globalAlpha = currentOpacity;
                const p1 = points[points.length - 2];
                const p2 = points[points.length - 1];
                const distance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                applyVectorBrush(p1, p2, distance);
            }
            
            ctx.restore();
        }

        function stopDrawing() {
            if(isDrawing) {
                isDrawing = false;
                points = [];
                redoStack = [];
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // --- BRUSH STYLES ---
        function applyVectorBrush(p1, p2, speed) {
            ctx.strokeStyle = currentColor;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;

            switch (currentStyle) {
                case 'pen':
                    ctx.lineWidth = currentSize;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    break;

                case 'neon':
                    ctx.shadowColor = currentColor;
                    ctx.shadowBlur = currentSize * 0.8;
                    ctx.lineWidth = currentSize;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = currentSize * 0.22;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    break;

                case 'calligraphy':
                    const targetWidth = Math.max(1.5, currentSize - (speed * 0.4));
                    ctx.lineWidth = targetWidth;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    break;

                case 'pencil':
                    ctx.lineWidth = Math.max(0.5, currentSize * 0.15);
                    ctx.strokeStyle = hexToRGBA(currentColor, 0.4); 
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();

                    ctx.strokeStyle = hexToRGBA(currentColor, 0.15);
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x + (Math.random() - 0.5) * currentSize * 0.3, p1.y + (Math.random() - 0.5) * currentSize * 0.3);
                        ctx.lineTo(p2.x + (Math.random() - 0.5) * currentSize * 0.3, p2.y + (Math.random() - 0.5) * currentSize * 0.3);
                        ctx.stroke();
                    }
                    break;

                case 'highlighter':
                    ctx.globalAlpha = currentOpacity * 0.3;
                    ctx.lineWidth = currentSize * 2;
                    ctx.lineCap = 'square';
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    break;

                case 'textured':
                    ctx.fillStyle = currentColor;
                    const steps = Math.max(1, speed / 2);
                    for (let i = 0; i < steps; i++) {
                        const t = i / steps;
                        const currX = p1.x + (p2.x - p1.x) * t;
                        const currY = p1.y + (p2.y - p1.y) * t;
                        for (let j = 0; j < 6; j++) {
                            const offsetX = (Math.random() - 0.5) * currentSize;
                            const offsetY = (Math.random() - 0.5) * currentSize;
                            const r = Math.random() * (currentSize * 0.12) + 0.8;
                            ctx.beginPath();
                            ctx.arc(currX + offsetX, currY + offsetY, r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    break;

                case 'sketch':
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    if (speed < 15) {
                        ctx.strokeStyle = hexToRGBA(currentColor, 0.12);
                        ctx.beginPath();
                        ctx.moveTo(p1.x + (Math.random()-0.5)*currentSize*2, p1.y + (Math.random()-0.5)*currentSize*2);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                    break;
            }
        }

        function hexToRGBA(hex, alpha) {
            const parsed = parseColorToHex(hex) || "#00FFFF";
            const r = parseInt(parsed.slice(1, 3), 16);
            const g = parseInt(parsed.slice(3, 5), 16);
            const b = parseInt(parsed.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // --- COLOR MANAGEMENT ---
        const colorPicker = document.getElementById('color-picker');
        const hexInput = document.getElementById('hex-input');
        const rgbInput = document.getElementById('rgb-input');
        const presetDots = document.querySelectorAll('.color-dot');

        function updateColorOutputs(hex, origin) {
            currentColor = hex;
            if(origin !== 'picker') colorPicker.value = hex;
            if(origin !== 'hex') hexInput.value = hex.toUpperCase();
            if(origin !== 'rgb') {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                rgbInput.value = `rgb(${r}, ${g}, ${b})`;
            }

            presetDots.forEach(dot => {
                if(dot.getAttribute('data-color').toLowerCase() === hex.toLowerCase()) {
                    dot.classList.add('selected');
                } else {
                    dot.classList.remove('selected');
                }
            });
            disableEraser();
        }

        colorPicker.addEventListener('input', (e) => updateColorOutputs(e.target.value, 'picker'));
        presetDots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                updateColorOutputs(e.target.getAttribute('data-color'), 'preset');
            });
        });

        hexInput.addEventListener('change', (e) => {
            let val = e.target.value.trim();
            if(!val.startsWith('#')) val = '#' + val;
            if(/^#[0-9A-F]{6}$/i.test(val)) updateColorOutputs(val, 'hex');
            else updateColorOutputs(currentColor, 'restore');
        });

        rgbInput.addEventListener('change', (e) => {
            let val = e.target.value.toLowerCase();
            const match = val.match(/\d+/g);
            if (match && match.length >= 3) {
                const r = Math.min(255, parseInt(match[0]));
                const g = Math.min(255, parseInt(match[1]));
                const b = Math.min(255, parseInt(match[2]));
                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                updateColorOutputs(hex, 'rgb');
            } else { updateColorOutputs(currentColor, 'restore'); }
        });

        function parseColorToHex(colorVal) {
            if(colorVal.startsWith('#')) return colorVal;
            const match = colorVal.match(/\d+/g);
            if(match && match.length >= 3) {
                return "#" + ((1 << 24) + (parseInt(match[0]) << 16) + (parseInt(match[1]) << 8) + parseInt(match[2])).toString(16).slice(1);
            }
            return null;
        }

        // --- UI CONTROLS ---
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentStyle = e.target.getAttribute('data-style');
                disableEraser();
            });
        });

        const sizeSlider = document.getElementById('brush-size');
        const sizeVal = document.getElementById('size-val');
        sizeSlider.addEventListener('input', (e) => {
            currentSize = e.target.value;
            sizeVal.innerText = `${currentSize}px`;
        });

        const opacitySlider = document.getElementById('brush-opacity');
        const opacityVal = document.getElementById('opacity-val');
        opacitySlider.addEventListener('input', (e) => {
            currentOpacity = e.target.value / 100;
            opacityVal.innerText = `${e.target.value}%`;
        });

        const btnDraw = document.getElementById('btn-draw');
        const btnErase = document.getElementById('btn-erase');
        const modeIndicator = document.getElementById('mode-indicator');

        btnErase.addEventListener('click', () => {
            isEraser = true;
            btnErase.classList.add('active');
            btnDraw.classList.remove('active');
            modeIndicator.innerText = "Status: Eraser Mode";
        });

        btnDraw.addEventListener('click', disableEraser);

        function disableEraser() {
            isEraser = false;
            btnDraw.classList.add('active');
            btnErase.classList.remove('active');
            modeIndicator.innerText = "Status: Drawing Mode";
        }

        // --- FIX PERBAIKAN DINAMIS: TEMA DENGAN CLASS CSS ---
        document.querySelectorAll('.bg-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const theme = e.target.getAttribute('data-bg');
                currentTheme = theme;

                if (theme === 'light') {
                    document.body.classList.add('light-theme');
                } else {
                    document.body.classList.remove('light-theme');
                }
                // Sama sekali tidak menimpa / memengaruhi data piksel di canvas!
            });
        });

        // --- HISTORY MANAGEMENT ---
        function saveState() {
            if (historyStack.length >= MAX_HISTORY) historyStack.shift();
            historyStack.push(canvas.toDataURL());
        }

        document.getElementById('btn-undo').addEventListener('click', undoAction);
        document.getElementById('btn-redo').addEventListener('click', redoAction);

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redoAction(); }
        });

        function undoAction() {
            if (historyStack.length > 0) {
                redoStack.push(canvas.toDataURL());
                let previousStateURL = historyStack.pop();
                let img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = previousStateURL;
            }
        }

        function redoAction() {
            if (redoStack.length > 0) {
                historyStack.push(canvas.toDataURL());
                let nextStateURL = redoStack.pop();
                let img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = nextStateURL;
            }
        }

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm('Apakah kamu yakin ingin menghapus seluruh papan gambar?')) {
                saveState();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                redoStack = [];
            }
        });

        // --- FIX EKSPORT IMAGE: RENDERING LATAR BELAKANG SECARA REAL-TIME ---
        document.getElementById('btn-save').addEventListener('click', () => {
            // Buat canvas bayangan sementara untuk menggabungkan BG dan coretan saat diunduh
            const exportCanvas = document.createElement('canvas');
            const exportCtx = exportCanvas.getContext('2d');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;

            // Isikan latar belakang sesuai tema aktif sekarang
            exportCtx.fillStyle = (currentTheme === 'light') ? '#f4f4f5' : '#121214';
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // Tumpuk dengan coretan asli di atasnya
            exportCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = `StudioArt-${Date.now()}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
