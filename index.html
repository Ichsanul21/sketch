<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Studio Canvas</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: rgba(30, 30, 35, 0.75);
            --accent-color: #6366f1;
            --text-color: #e4e4e7;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Canvas Wrapper */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Glassmorphism Control Panel */
        .panel {
            position: absolute;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }

        #toolbar {
            top: 20px;
            left: 20px;
            width: 280px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        #top-bar {
            top: 20px;
            right: 20px;
            flex-direction: row;
            align-items: center;
        }

        /* Typography & Elements */
        h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a1a1aa;
            margin-bottom: 6px;
        }

        .section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        /* Grid untuk Pilihan Style */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
            color: white;
        }

        /* Slider Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a1a1aa;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Color Picker Custom */
        .color-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border-color);
            border-radius: 50%;
        }

        .preset-colors {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            flex-grow: 1;
        }

        .color-dot {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .color-dot:hover {
            transform: scale(1.15);
        }

        /* Status & Action Buttons */
        .action-row {
            display: flex;
            gap: 8px;
        }

        .action-row button {
            flex: 1;
            padding: 8px;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Mode Indicator */
        #mode-indicator {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        /* Sembunyikan scrollbar untuk kebersihan visual */
        #toolbar::-webkit-scrollbar {
            width: 4px;
        }
        #toolbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <!-- Top Action Bar -->
    <div id="top-bar" class="panel">
        <span id="mode-indicator">Status: Ready</span>
        <button id="btn-undo" title="Undo (Ctrl+Z)">↶</button>
        <button id="btn-redo" title="Redo (Ctrl+Y)">↷</button>
        <button id="btn-clear" class="btn-danger">Clear</button>
        <button id="btn-save" style="background: #10b981; color: white;">Save Canvas</button>
    </div>

    <!-- Main Sidebar Controls -->
    <div id="toolbar" class="panel">
        <!-- Kuas Styles -->
        <div class="section">
            <h3>Brush Style</h3>
            <div class="style-grid">
                <button class="style-btn active" data-style="neon">✨ Neon Glow</button>
                <button class="style-btn" data-style="pen">✒️ Calligraphy</button>
                <button class="style-btn" data-style="textured">🎨 Textured</button>
                <button class="style-btn" data-style="highlighter">🖍️ Highlighter</button>
                <button class="style-btn" data-style="sketch">✏️ Sketch Line</button>
                <button class="style-btn" data-style="mirrored">🪞 Mirror Art</button>
            </div>
        </div>

        <!-- Warna -->
        <div class="section">
            <h3>Color Palette</h3>
            <div class="color-row">
                <input type="color" id="color-picker" value="#00ffff">
                <div class="preset-colors">
                    <div class="color-dot" style="background: #00ffff;" data-color="#00ffff"></div>
                    <div class="color-dot" style="background: #ff007f;" data-color="#ff007f"></div>
                    <div class="color-dot" style="background: #39ff14;" data-color="#39ff14"></div>
                    <div class="color-dot" style="background: #ffff00;" data-color="#ffff00"></div>
                    <div class="color-dot" style="background: #ffffff;" data-color="#ffffff"></div>
                </div>
            </div>
        </div>

        <!-- Ukuran & Opacity -->
        <div class="section">
            <div class="control-group">
                <div class="control-label">
                    <span>Brush Size</span>
                    <span id="size-val">12px</span>
                </div>
                <input type="range" id="brush-size" min="2" max="100" value="12">
            </div>
            <div class="control-group" style="margin-top: 12px;">
                <div class="control-label">
                    <span>Opacity</span>
                    <span id="opacity-val">100%</span>
                </div>
                <input type="range" id="brush-opacity" min="10" max="100" value="100">
            </div>
        </div>

        <!-- Mode Penghapus & Background -->
        <div class="section">
            <h3>Tools & Canvas</h3>
            <div class="action-row" style="margin-bottom: 8px;">
                <button id="btn-draw" class="active">✏️ Draw Mode</button>
                <button id="btn-erase">🧽 Eraser</button>
            </div>
            <div class="control-group">
                <div class="control-label">
                    <span>Canvas Background</span>
                </div>
                <div class="action-row">
                    <button class="bg-btn active" data-bg="#121214">Dark</button>
                    <button class="bg-btn" data-bg="#ffffff" style="color:#121214; background:#fff">Light</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Canvas Workspace -->
    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        // State Management
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentStyle = 'neon';
        let currentColor = '#00ffff';
        let currentSize = 12;
        let currentOpacity = 1;
        let isEraser = false;
        let canvasBg = '#121214';
        
        // Undo & Redo History Arrays
        let historyStack = [];
        let redoStack = [];
        const MAX_HISTORY = 25; // Supaya memori aman

        // Setup Awal Ukuran Canvas
        function resizeCanvas() {
            // Simpan gambar saat ini sebelum resize agar tidak hilang
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // Set Background
            ctx.fillStyle = canvasBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Gambar ulang konten lama
            ctx.drawImage(tempCanvas, 0, 0);
        }

        window.addEventListener('resize', resizeCanvas);
        // Inisialisasi awal sekali
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        ctx.fillStyle = canvasBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- MOUSE & TOUCH TRACKING EVENT LISTENERS ---
        
        function getCoordinates(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
            
            // Simpan state sebelum goresan baru untuk system Undo
            saveState();
            
            // Trigger titik awal jika hanya diklik tanpa digeser
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Mencegah scrolling layar saat touch di HP

            const coords = getCoordinates(e);
            const currentX = coords.x;
            const currentY = coords.y;

            // Hitung kalkulasi kecepatan (bagus untuk style Pen / Calligraphy)
            const distance = Math.hypot(currentX - lastX, currentY - lastY);
            
            ctx.save();
            
            if (isEraser) {
                // Mode Penghapus
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = currentSize * 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } else {
                // Mode Menggambar Normal dengan Styles
                ctx.globalAlpha = currentOpacity;
                applyBrushStyle(lastX, lastY, currentX, currentY, distance);
            }
            
            ctx.restore();

            // Jalankan fungsi efek kaca cermin jika modenya aktif
            if (currentStyle === 'mirrored' && !isEraser) {
                ctx.save();
                ctx.globalAlpha = currentOpacity;
                // Hitung posisi cermin horizontal (X)
                const mirrorLastX = canvas.width - lastX;
                const mirrorCurrentX = canvas.width - currentX;
                applyBrushStyle(mirrorLastX, lastY, mirrorCurrentX, currentY, distance);
                ctx.restore();
            }

            lastX = currentX;
            lastY = currentY;
        }

        function stopDrawing() {
            if(isDrawing) {
                isDrawing = false;
                redoStack = []; // Reset Redo ketika ada coretan baru
            }
        }

        // Mouse Events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch Events (Mobile/Tablet)
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // --- CORE BRUSH STYLES LOGIC ---
        
        function applyBrushStyle(x1, y1, x2, y2, speed) {
            ctx.strokeStyle = currentColor;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (currentStyle) {
                case 'neon':
                    // Efek Neon bertumpuk (Glow effect)
                    ctx.shadowColor = currentColor;
                    ctx.shadowBlur = currentSize * 0.8;
                    ctx.lineWidth = currentSize;
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    
                    // Core putih bagian tengah agar terkesan intensitas tinggi
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = currentSize * 0.25;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    break;

                case 'pen':
                    // Gaya Kaligrafi / Dinamis berdasarkan Kecepatan Gerak
                    // Semakin cepat ditarik, garis semakin tipis
                    const targetWidth = Math.max(2, currentSize - (speed * 0.5));
                    ctx.lineWidth = targetWidth;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    break;

                case 'highlighter':
                    // Stabilo transparan bentuk kotak lebar
                    ctx.globalAlpha = currentOpacity * 0.3; // Memaksa transparan semi transparan
                    ctx.lineWidth = currentSize * 2;
                    ctx.lineCap = 'square';
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    break;

                case 'textured':
                    // Efek Brush Bertekstur Bercak (Menggunakan partikel bulatan acak)
                    ctx.fillStyle = currentColor;
                    const strokeDist = Math.hypot(x2 - x1, y2 - y1);
                    const steps = Math.max(1, strokeDist / 2);
                    
                    for (let i = 0; i < steps; i++) {
                        const t = i / steps;
                        const currX = x1 + (x2 - x1) * t;
                        const currY = y1 + (y2 - y1) * t;
                        
                        // Buat sekelompok dot kecil di area sekitar kuas utama
                        for (let j = 0; j < 6; j++) {
                            const offsetX = (Math.random() - 0.5) * currentSize;
                            const offsetY = (Math.random() - 0.5) * currentSize;
                            const r = Math.random() * (currentSize * 0.15) + 1;
                            
                            ctx.beginPath();
                            ctx.arc(currX + offsetX, currY + offsetY, r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    break;

                case 'sketch':
                    // Style Garis Sketsa Arsir Berjejaring
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    
                    // Hubungkan garis tipis acak ke history titik terdekat jika lambat
                    if (speed < 15) {
                        ctx.strokeStyle = hexToRGBA(currentColor, 0.15);
                        ctx.beginPath();
                        ctx.moveTo(x1 + (Math.random()-0.5)*currentSize*2, y1 + (Math.random()-0.5)*currentSize*2);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                    break;

                case 'mirrored':
                    // Menggambar garis standar, efek mirror ditangani di trigger fungsi induk
                    ctx.lineWidth = currentSize;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    break;
            }
        }

        // Helper Konversi Warna Hex ke RGBA untuk transparansi sketsa
        function hexToRGBA(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }


        // --- UI & CONFIGURATION CONTROLS HANDLING ---

        // Selector Brush Style Buttons
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentStyle = e.target.getAttribute('data-style');
                
                // Matikan mode eraser otomatis jika pindah style brush
                disableEraser();
            });
        });

        // Color Inputs
        const colorPicker = document.getElementById('color-picker');
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            disableEraser();
        });

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                const pickedColor = e.target.getAttribute('data-color');
                currentColor = pickedColor;
                colorPicker.value = pickedColor;
                disableEraser();
            });
        });

        // Sliders
        const sizeSlider = document.getElementById('brush-size');
        const sizeVal = document.getElementById('size-val');
        sizeSlider.addEventListener('input', (e) => {
            currentSize = e.target.value;
            sizeVal.innerText = `${currentSize}px`;
        });

        const opacitySlider = document.getElementById('brush-opacity');
        const opacityVal = document.getElementById('opacity-val');
        opacitySlider.addEventListener('input', (e) => {
            currentOpacity = e.target.value / 100;
            opacityVal.innerText = `${e.target.value}%`;
        });

        // Eraser Toggle
        const btnDraw = document.getElementById('btn-draw');
        const btnErase = document.getElementById('btn-erase');
        const modeIndicator = document.getElementById('mode-indicator');

        btnErase.addEventListener('click', () => {
            isEraser = true;
            btnErase.classList.add('active');
            btnDraw.classList.remove('active');
            modeIndicator.innerText = "Status: Eraser Mode";
        });

        btnDraw.addEventListener('click', disableEraser);

        function disableEraser() {
            isEraser = false;
            btnDraw.classList.add('active');
            btnErase.classList.remove('active');
            modeIndicator.innerText = "Status: Drawing Mode";
        }

        // Background Color Controls
        document.querySelectorAll('.bg-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                canvasBg = e.target.getAttribute('data-bg');
                
                // Simpan history agar pergantian background bisa di-undo
                saveState();
                
                // Isikan background baru tanpa merusak coretan transparan di atasnya
                ctx.save();
                ctx.globalCompositeOperation = 'destination-over';
                ctx.fillStyle = canvasBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            });
        });


        // --- HISTORY MANAGEMENT (UNDO / REDO / CLEAR) ---

        function saveState() {
            // Masukkan snapshot canvas saat ini ke stack history
            if (historyStack.length >= MAX_HISTORY) {
                historyStack.shift(); // Buang riwayat paling lama jika limit penuh
            }
            historyStack.push(canvas.toDataURL());
        }

        document.getElementById('btn-undo').addEventListener('click', undoAction);
        document.getElementById('btn-redo').addEventListener('click', redoAction);

        // Shortcut Keyboard Support (Ctrl+Z & Ctrl+Y)
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undoAction();
            }
            if (e.ctrlKey && e.key === 'y') {
                e.preventDefault();
                redoAction();
            }
        });

        function undoAction() {
            if (historyStack.length > 0) {
                // Dorong current state ke redo stack
                redoStack.push(canvas.toDataURL());
                
                let previousStateURL = historyStack.pop();
                let img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = previousStateURL;
            }
        }

        function redoAction() {
            if (redoStack.length > 0) {
                historyStack.push(canvas.toDataURL());
                
                let nextStateURL = redoStack.pop();
                let img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = nextStateURL;
            }
        }

        // Clear Screen
        document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm('Apakah kamu yakin ingin menghapus seluruh papan gambar?')) {
                saveState();
                ctx.fillStyle = canvasBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                redoStack = [];
            }
        });

        // Export Canvas To Image File (.PNG)
        document.getElementById('btn-save').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `StudioArt-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

    </script>
</body>
</html>
